[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[dev]
  command    = "npm --prefix src/frontend run dev"
  targetPort = 5173
  port       = 9000

[build]
  command = "cd src/frontend && npm install && npm run build"
  publish = "src/frontend/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  included_files = ["src/backend/**"]

[functions."analyze"]
  timeout = 26

[functions."report"]
  timeout = 26

[functions."house_estimate"]
  timeout = 26

[functions."engineering_assist"]
  timeout = 26

[functions."price_predict"]
  timeout = 26

# Proxy /api/analyze → Netlify Function
[[redirects]]
  from   = "/api/analyze"
  to     = "/.netlify/functions/analyze"
  status = 200
  force  = true

# Proxy /api/report → Netlify Function
[[redirects]]
  from   = "/api/report"
  to     = "/.netlify/functions/report"
  status = 200
  force  = true

# Proxy /api/house_estimate → Netlify Function
[[redirects]]
  from   = "/api/house_estimate"
  to     = "/.netlify/functions/house_estimate"
  status = 200
  force  = true

# Proxy /api/engineering_assist → Netlify Function
[[redirects]]
  from   = "/api/engineering_assist"
  to     = "/.netlify/functions/engineering_assist"
  status = 200
  force  = true

# Proxy /api/price_predict → Netlify Function
[[redirects]]
  from   = "/api/price_predict"
  to     = "/.netlify/functions/price_predict"
  status = 200
  force  = true

# SPA routing — all other paths serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
